[SERVER]
# 服务器端口
PORT = 5000

# 是否允许局域网访问（True=允许, False=仅本机）
ALLOW_LAN = True

[PATHS]
# 共享文件夹路径（存放上传的文件）
# 注意：共享整个D盘，请确保有足够的权限和安全措施
UPLOAD_FOLDER = D:/共享文件夹

# 临时上传文件夹（用于分块上传，会自动创建）
TEMP_FOLDER = temp_uploads

# 静态资源文件夹（用于背景图等，会自动创建）
STATIC_FOLDER = static

[FILES]
# 单个文件最大大小（MB）
MAX_FILE_SIZE_MB = 100

# 文件夹最多包含的文件数量
MAX_FOLDER_FILES = 1000

# 是否自动解压ZIP文件
AUTO_EXTRACT_ZIP = False

# 允许的文件扩展名（用逗号分隔，留空表示允许所有文件）
ALLOWED_EXTENSIONS = txt,pdf,png,jpg,jpeg,gif,doc,docx,xls,xlsx,zip,rar,py,json,jsonl,md,mp4,avi,mkv,mp3,wav,flac,exe,apk,iso,dmg,deb,rpm

[ADVANCED]
# 分块上传的块大小（MB）
CHUNK_SIZE_MB = 10

# 任务信息保存文件
TASKS_FILE = tasks.json

# 用户注册信息保存文件
REGISTRATIONS_FILE = user_registrations.json

[DISPLAY]
# 是否隐藏系统文件夹
HIDE_SYSTEM_FOLDERS = True

# 需要隐藏的文件夹和文件名（逗号分隔，不区分大小写）
HIDDEN_ITEMS = $RECYCLE.BIN,$Recycle.Bin,System Volume Information,RECYCLER,Config.Msi,Recovery,ProgramData,hiberfil.sys,pagefile.sys,swapfile.sys,DumpStack.log.tmp,System32,Windows,Program Files,Program Files (x86),PerfLogs

# 是否启用自动刷新（检测文件变化）
AUTO_REFRESH = True

# 自动刷新间隔（秒）
REFRESH_INTERVAL = 5
